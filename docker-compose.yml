version: '3.8'

services:
  # The Backend
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # This ensures files uploaded by users are saved to the host machine
      - ./app/uploads:/app/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@db:5432/compliance_db
      - REDIS_URL=redis://cache:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - MASTER_RESET_KEY=${MASTER_RESET_KEY}
      # Defaults to development for a friction-free local `docker-compose up`.
      # Real deployments MUST set ENVIRONMENT=production (see
      # .env.production.example) — it enforces a real SECRET_KEY and marks
      # the auth cookie Secure, which requires TLS in front of this app.
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      - SQL_ECHO=${SQL_ECHO:-false}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  # The Database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=compliance_db
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d compliance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Cache
  cache:
    image: redis:7-alpine

volumes:
  db-data: