version: '3.8'

services:
  # The Backend
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./app/uploads:/app/app/uploads
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bookr_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_prod}
      - POSTGRES_DB=${POSTGRES_DB:-compliance_db}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-bookr_admin}:${POSTGRES_PASSWORD:-change_me_in_prod}@db:5432/${POSTGRES_DB:-compliance_db}
      - REDIS_URL=redis://cache:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - MASTER_RESET_KEY=${MASTER_RESET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      - SQL_ECHO=${SQL_ECHO:-false}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started

  # The Database
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bookr_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_prod}
      - POSTGRES_DB=${POSTGRES_DB:-compliance_db}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookr_admin} -d ${POSTGRES_DB:-compliance_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Cache
  cache:
    image: redis:7-alpine

volumes:
  db-data: