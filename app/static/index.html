<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookr, Inc. Corporate Compliance Command Centre</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght=0,9..144,300..600;1,9..144,400&family=IBM+Plex+Mono:wght=400;500&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">

  <style>
    /* CSS VARIABLE PATTERNS & THEME DEFINITIONS */
    :root {
      --bg: #fbfbfa;
      --surface: #ffffff;
      --surface2: #f4f4f2;
      --border: #e4e4e0;
      --border-soft: #ededea;
      
      --ink: #1c1c1a;
      --ink-dim: #5c5c57;
      --ink-faint: #9c9c93;
      --brass: #826e4d;
      --brass-soft: #dcd6cd;

      /* Scope Matrix Color Tags */
      --fed: #1e3a8a;
      --ca: #b91c1c;
      --de: #0d9488;
      --intl: #4b5563;
      --ins: #7c3aed; 

      /* Target Status Indicators */
      --overdue: #dc2626;
      --soon: #d97706;
      --month: #ca8a04;
      --filed: #16a34a;
      --upcoming: #2563eb;
      --needsdate: #7c3aed;

      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      font-size: 14px;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Left Frame Command Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand-title {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--brass);
      border-bottom: 2px solid var(--brass-soft);
      padding-bottom: 12px;
    }

    .sidebar-section h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-dim);
      margin-bottom: 12px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }
    .stat-line .n { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
    .stat-line.overdue .n { color: var(--overdue); }
    .stat-line.soon .n { color: var(--soon); }
    .stat-line.month .n { color: var(--month); }
    .stat-line.filed .n { color: var(--filed); }
    .stat-line.upcoming .n { color: var(--upcoming); }
    .stat-line.needsdate .n { color: var(--needsdate); }

    .scope-line {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background 0.2s;
    }
    .scope-line:hover { background: var(--bg); }
    .scope-line.off { opacity: 0.35; text-decoration: line-through; }
    .scope-line .swatch { width: 10px; height: 10px; border-radius: 50%; }
    .scope-line .cnt { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-faint); }

    .unsched-item {
      font-size: 12px;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      color: #6b21a8;
      padding: 6px 10px;
      border-radius: 4px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .unsched-empty { font-size: 12px; color: var(--ink-faint); font-style: italic; }

    /* Main Panel Viewports */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .control-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .top-bar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title-cluster h2 {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .view-toggle {
      display: flex;
      gap: 8px; 
    }

    .view-toggle button, .nav-cluster button, .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .view-toggle button:hover, .nav-cluster button:hover, .btn:hover { background: var(--bg); border-color: var(--ink-dim); }
    .view-toggle button.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

    .btn.primary { background: var(--brass); color: var(--surface); border-color: var(--brass); }
    .btn.primary:hover { background: #6e5d40; border-color: #6e5d40; }
    .btn.mini { font-size: 11px; padding: 3px 8px; }
    .btn.ghost { border-color: transparent; background: transparent; color: var(--ink-dim); }
    .btn.ghost:hover { background: var(--border-soft); color: var(--ink); }

    /* Delete Button UI */
    .btn-delete {
      background: transparent;
      border: 1px solid var(--overdue);
      color: var(--overdue);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: #fef2f2; }

    /* Unified Search Group */
    .search-group {
      display: flex;
      align-items: center;
    }
    .search-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      padding: 6px 10px;
      border-radius: var(--radius) 0 0 var(--radius);
      color: var(--ink-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-group select:hover { background: var(--border-soft); }
    .search-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--ink);
      width: 220px;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      transition: border-color 0.2s;
    }
    .search-group input:focus {
      border-color: var(--ink-dim);
    }

    .select-input {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: var(--radius);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .display-workspace {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    /* Calendar Grid Layouts */
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: 600;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--ink-dim);
      margin-bottom: 8px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: minmax(110px, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .day-cell {
      background: var(--surface);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .day-cell:hover { background: var(--bg); }
    .day-cell.outside { background: var(--surface2); color: var(--ink-faint); cursor: default; }
    .day-cell.today { background: #fffbeb; box-shadow: inset 0 0 0 2px #fef3c7; }

    .daynum { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; margin-bottom: 4px; }

    .chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--surface);
    }
    .chip.overdue { background: var(--overdue); }
    .chip.soon { background: var(--soon); }
    .chip.month { background: var(--month); }
    .chip.filed { background: var(--filed); }
    .chip.upcoming { background: var(--upcoming); }
    .chip.needsdate { background: var(--needsdate); }

    /* Master Ledger Workspaces */
    .master-ledger-container {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .quarter-section-lane {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .quarter-lane-title {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      color: var(--brass);
      border-bottom: 2px solid var(--brass-soft);
      padding-bottom: 8px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .quarter-lane-title .count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--ink-dim);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 12px;
    }

    .list-month-header {
      font-family: 'Fraunces', serif;
      font-size: 14px;
      color: var(--ink-dim);
      border-bottom: 1px dashed var(--border);
      padding-bottom: 4px;
      margin: 16px 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      display: flex;
      overflow: hidden;
    }

    .task-card .num-col {
      background: var(--surface2);
      border-right: 1px solid var(--border);
      width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--ink-faint);
      font-size: 12px;
    }

    .task-card .body-col { flex: 1; padding: 16px; position: relative; }
    .task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
    .task-top h3 { font-size: 15px; font-weight: 600; color: var(--ink); }

    .status-block { display: flex; align-items: center; gap: 10px; }
    .badge {
      width: 45px;
      height: 18px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--surface);
      font-weight: bold;
    }
    .badge.overdue, .badge.Q1 { background: var(--overdue); }
    .badge.soon, .badge.Q2 { background: var(--soon); }
    .badge.filed, .badge.Q3 { background: var(--filed); }
    .badge.upcoming, .badge.Q4 { background: var(--upcoming); }
    .badge.needsdate, .badge.ROLL { background: var(--needsdate); }
    .badge.INSURANCE { background: #7c3aed; width: auto; padding: 0 8px; }

    .status-label { font-size: 12px; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; font-weight: 500; display: inline-block; letter-spacing: 0.02em; }
    .status-label.overdue { color: var(--overdue); }
    .status-label.soon { color: var(--soon); }
    .status-label.month { color: var(--month); }
    .status-label.filed { color: var(--filed); }
    .status-label.upcoming { color: var(--upcoming); }
    .status-label.needsdate { color: var(--needsdate); }

    .meta-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .pill { font-size: 11px; font-weight: 500; padding: 1px 8px; border-radius: 12px; color: #fff; }
    .pill.scope-fed { background: var(--fed); }
    .pill.scope-ca { background: var(--ca); }
    .pill.scope-de { background: var(--de); }
    .pill.scope-intl { background: var(--intl); }
    .pill.scope-ins { background: var(--ins); }
    
    .due-text { font-size: 12px; color: var(--ink-dim); font-weight: 500; }
    .due-text .cap { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-faint); }

    .action-row { display: flex; gap: 8px; align-items: center; border-top: 1px dashed var(--border-soft); padding-top: 12px; margin-top: 12px; }

    .inline-form { display: none; margin-top: 12px; padding: 16px; background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); }
    .inline-form.open { display: block; }
    
    .form-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--ink-dim); text-transform: uppercase; }
    .field input, .field select, .field textarea { background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; color: var(--ink); font-family: inherit; font-size: 13px; width: 100%; }

    /* Structural Overlays */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(28, 28, 26, 0.4); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-container {
      background: var(--surface); border: 1px solid var(--border);
      width: 100%; max-width: 800px; max-height: 85vh; border-radius: 8px;
      display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
    .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-family: 'Fraunces', serif; font-size: 20px; color: var(--brass); }
    .modal-body { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: var(--bg); }
    .modal-empty { text-align: center; padding: 40px; color: var(--ink-faint); font-style: italic; }

    /* Redesigned Form / Wizard Layout Layouts */
    .task-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .task-form-grid .full-width { grid-column: span 2; }
    .task-form-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Redesigned Modern History / Audit Rows */
    .history-archive-stack { display: flex; flex-direction: column; gap: 12px; }
    .history-archive-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; display: grid; grid-template-columns: 140px 1fr 150px 100px; align-items: center; gap: 16px;
    }
    .history-archive-card .timestamp { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-dim); }
    .history-archive-card .details { display: flex; flex-direction: column; gap: 4px; }
    .history-archive-card .details h4 { font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px;}
    .history-archive-card .details p { font-size: 12px; color: var(--ink-dim); }
    .history-archive-card .details .note { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
    .history-archive-card .cycle { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink); }
    .history-archive-card .actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

    .empty-state { padding: 48px; text-align: center; color: var(--ink-faint); font-style: italic; border: 1px dashed var(--border); border-radius: var(--radius); }
    
    .dl-link { color: var(--brass); text-decoration: none; font-weight: 500; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .dl-link:hover { text-decoration: underline; }

    .history-panel { display: none; margin-top: 12px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .history-panel.open { display: block; }
    .history-panel table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
    .history-panel th { background: var(--surface2); padding: 8px 14px; font-family: 'IBM Plex Mono', monospace; color: var(--ink-dim); font-size: 11px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
    .history-panel td { padding: 10px 14px; border-bottom: 1px solid var(--border-soft); background: var(--surface); vertical-align: middle; }
    .history-empty { text-align: center; color: var(--ink-faint); font-style: italic; padding: 16px !important; }
    .del-x { color: var(--overdue); cursor: pointer; font-weight: bold; text-align: center; font-size: 14px; width: 40px; }
    .del-x:hover { background: #fef2f2; }
    
    .del-btn-icon { color: var(--ink-faint); cursor: pointer; font-size: 16px; font-weight: 500; padding: 2px 6px; border-radius: 4px; transition: all 0.2s; }
    .del-btn-icon:hover { color: var(--overdue); background: #fef2f2; }

    /* Report Specific Styles */
    .report-stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .report-stat-box h4 { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 8px; }
    .report-stat-box h2 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="brand-title">Bookr, Inc.</div>
      <div class="sidebar-section">
        <h4>Status Matrix <span style="font-size:10px; opacity:0.6;" id="matrixYearLabel"></span></h4>
        <div id="statsList"></div>
      </div>
      <div class="sidebar-section">
        <h4>Jurisdictions</h4>
        <div id="scopeList"></div>
      </div>
      <div class="sidebar-section">
        <h4>Floating Milestones</h4>
        <div id="unschedList"></div>
      </div>
    </div>

    <div class="main-panel">
      <div class="control-header">
        <div class="top-bar-row">
          <div class="header-title-cluster">
            <h2 id="monthTitle">Corporate Framework View</h2>
          </div>
          <div class="toolbar">
            
            <div class="search-group">
              <select id="quickFilterSelect">
                <option value="all">All Filters</option>
                <optgroup label="Jurisdictions">
                  <option value="fed">Federal Only</option>
                  <option value="ca">California Only</option>
                  <option value="de">Delaware Only</option>
                  <option value="intl">Internal Only</option>
                  <option value="ins">Insurance Only</option>
                </optgroup>
                <optgroup label="Timeframes">
                  <option value="1w">Due < 7 Days</option>
                  <option value="2w">Due < 14 Days</option>
                  <option value="1m">Due < 30 Days</option>
                </optgroup>
                <optgroup label="Status Check">
                  <option value="overdue_q">Overdue Only</option>
                  <option value="filed_q">Executed Only</option>
                </optgroup>
              </select>
              <input type="text" id="searchBox" placeholder="Search parameters...">
            </div>

            <div class="view-toggle"></div>
            <button id="addMilestoneBtn" class="btn small primary">+ Add Task</button>
            <button id="generateReportBtn" class="btn small primary" style="background:var(--ink); border-color:var(--ink);">Generate Report</button>
            <button id="exportCsv" class="btn small">Export Ledger</button>
          </div>
        </div>

        <div class="top-bar-row" id="calNavCluster" style="justify-content: flex-start; gap: 12px;">
          <div class="nav-cluster" id="calendarControls">
            <button id="prevMonth">Prior</button>
            <button id="todayBtn">Current Cycle</button>
            <button id="nextMonth">Forward</button>
          </div>
          <div class="field" style="flex-direction:row; align-items:center; gap:8px;">
            <label style="font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-dim)">Fiscal Cycle:</label>
            <select id="yearSelect" class="select-input"></select>
          </div>
        </div>
      </div>

      <div class="display-workspace" id="mainContent"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">Structural Pipeline Records</h2>
        <button id="modalCloseBtn" class="btn small">Close Window</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
  let CORE_TASKS = [
    {
      id:'1099nec', num:1, quarter:'Q1', scope:'Federal', short:'1099-NEC',
      title:'Form 1099-NEC Filing & Distribution',
      dueType:'fixed', dueMonth:1, dueDay:31, dueText:'January 31',
      entity:'Bookr, Inc.',
      portal:{name:'IRS FIRE System', url:'https://fire.irs.gov/'},
      altNote:'Can also be filed directly through payroll software such as Gusto or Rippling.',
      info:'Required only if Bookr paid an unincorporated contractor, freelancer, or unincorporated LLC $600 or more in the prior calendar year via ACH, check, or wire. Pebble LLC is paid by company credit card, so Pebble is exempt regardless of amount. Confirm against your actual vendor payment ledger.'
    },
    {
      id:'w2w3', num:2, quarter:'Q1', scope:'Federal', short:'W-2 / W-3',
      title:'Wage and Tax Statements (Forms W-2 & W-3)',
      dueType:'fixed', dueMonth:1, dueDay:31, dueText:'January 31',
      entity:'Bookr, Inc.',
      portal:{name:'SSA Business Services Online', url:'https://www.ssa.gov/bso'},
      altNote:'Managed comprehensively through your integrated Gusto workspace platform configurations.',
      info:'Applies — public listings put Bookr at roughly 11–60 W-2 employees, so this filing is live every year. The W-2 reports individual employee earnings/withholdings; the W-3 is the master transmittal filed with SSA.'
    },
    {
      id:'941q4', num:3, quarter:'Q1', scope:'Federal', short:'941 Q4',
      title:'Federal Employer’s Quarterly Tax Return (Form 941) — Q4 filing',
      dueType:'fixed', dueMonth:1, dueDay:31, dueText:'January 31',
      entity:'Bookr, Inc.',

  let TASKS = [];
  let STATE_LOGS = [];

  let state = {
    currentView: 'list', 
    currentYear: 2026,
    currentMonth: 6,
    selectedScopes: ['Federal', 'California', 'Delaware', 'Internal', 'Insurance'],
    selectedStatuses: ['overdue', 'soon', 'month', 'filed', 'upcoming', 'needsdate'],
    searchQuery: '',
    quickFilter: 'all'
  };

  function calculateTargetDate(year, month, day) {
    let targetDate = new Date(year, month - 1, day);
    if (targetDate.getDay() === 6) {
      targetDate.setDate(targetDate.getDate() + 2);
    } else if (targetDate.getDay() === 0) {
      targetDate.setDate(targetDate.getDate() + 1);
    }
    return targetDate;
  }

  function init() {
    loadDatabase();
    buildYearDropdownSelectors();
    
    document.getElementById('prevMonth').addEventListener('click', () => adjustMonth(-1));
    document.getElementById('nextMonth').addEventListener('click', () => adjustMonth(1));
    document.getElementById('todayBtn').addEventListener('click', setToCurrentCycle);
    
    document.getElementById('yearSelect').addEventListener('change', (e) => {
      state.currentYear = parseInt(e.target.value);
      render();
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
      state.searchQuery = e.target.value.trim().toLowerCase();
      render();
    });

    document.getElementById('quickFilterSelect').addEventListener('change', (e) => {
      state.quickFilter = e.target.value;
      render();
    });

    document.getElementById('exportCsv').addEventListener('click', exportToCsvArchive);
    document.getElementById('generateReportBtn').addEventListener('click', generateStatusReport);
    document.getElementById('addMilestoneBtn').addEventListener('click', openAddMilestoneWizard);
    document.getElementById('modalCloseBtn').addEventListener('click', closeModalWindow);

    setupViewToggles();
    render();
  }

  function loadDatabase() {
    const deletedCore = JSON.parse(localStorage.getItem('bookr_deleted_core') || '[]');
    let baseTasks = CORE_TASKS.filter(t => !deletedCore.includes(t.id));
    
    const customTasks = localStorage.getItem('bookr_custom_tasks');
    if (customTasks) {
      try { TASKS = [...baseTasks, ...JSON.parse(customTasks)]; } catch(e) { TASKS = [...baseTasks]; }
    } else {
      TASKS = [...baseTasks];
    }

    const savedLogs = localStorage.getItem('bookr_compliance_logs');
    if (savedLogs) {
      try { STATE_LOGS = JSON.parse(savedLogs); } catch(e) { STATE_LOGS = []; }
    }
  }

  function buildYearDropdownSelectors() {
    const select = document.getElementById('yearSelect');
    select.innerHTML = '';
    for(let y = 2024; y <= 2035; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = `${y} Fiscal Year`;
      if(y === state.currentYear) opt.selected = true;
      select.appendChild(opt);
    }
  }

  function setupViewToggles() {
    const container = document.querySelector('.view-toggle');
    container.innerHTML = '';
    
    const views = [
      { id: 'list', label: 'List View' },
      { id: 'calendar', label: 'Calendar' },
      { id: 'archive', label: 'History Archive' }
    ];
    
    views.forEach(v => {
      const b = document.createElement('button');
      b.textContent = v.label;
      if (state.currentView === v.id) b.classList.add('active');
      b.addEventListener('click', () => {
        state.currentView = v.id;
        document.querySelectorAll('.view-toggle button').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        render();
      });
      container.appendChild(b);
    });
  }

  function setToCurrentCycle() {
    const today = new Date();
    state.currentYear = today.getFullYear();
    state.currentMonth = today.getMonth();
    document.getElementById('yearSelect').value = state.currentYear;
    render();
  }

  function adjustMonth(offset) {
    state.currentMonth += offset;
    if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
    else if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
    document.getElementById('yearSelect').value = state.currentYear;
    render();
  }

  function getTaskStatus(task) {
    const logs = STATE_LOGS.filter(l => l.taskId === task.id && parseInt(l.fiscalYear || 2026) === state.currentYear);
    if (logs.length > 0 && logs.some(l => l.action === 'filed')) return 'filed';
    if (task.dueType === 'rolling') return 'needsdate';

    const todayObj = new Date(2026, 6, 13);
    
    let due;
    if (task.dueType === 'fixed') {
      due = calculateTargetDate(state.currentYear, task.dueMonth, task.dueDay);
    } else {
      due = new Date(state.currentYear, task.dueMonth - 1, task.dueDay);
    }
    
    if (due < todayObj) return 'overdue';
    
    const diffDays = Math.ceil((due - todayObj) / (1000 * 60 * 60 * 24));
    if (diffDays <= 7) return 'soon';
    if (diffDays <= 14) return 'soon';
    if (diffDays <= 30) return 'month';
    return 'upcoming';
  }

  function getStatusLabel(status) {
    switch(status) {
      case 'overdue': return 'OVERDUE';
      case 'soon': return 'ACTION IMMINENT (< 14D)';
      case 'month': return 'DUE < 30 DAYS';
      case 'filed': return 'FILED';
      case 'upcoming': return 'FUTURE PIPELINE';
      case 'needsdate': return 'UNSCHEDULED';
    }
    return '';
  }

  function getIconForStatus(status) {
    const colors = { overdue: 'var(--overdue)', soon: 'var(--soon)', month: 'var(--month)', filed: 'var(--filed)', upcoming: 'var(--upcoming)', needsdate: 'var(--needsdate)' };
    const color = colors[status] || 'var(--ink-faint)';
    
    if(status === 'filed') {
      return `<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;"><circle cx="12" cy="12" r="12" fill="${color}"/><path d="M7 12l3 3 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
    } else if(status === 'overdue' || status === 'soon') {
      return `<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;"><circle cx="12" cy="12" r="12" fill="${color}"/><path d="M12 7v6m0 4v.01" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
    } else if(status === 'upcoming' || status === 'month') {
      return `<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;"><circle cx="12" cy="12" r="12" fill="${color}"/><path d="M12 7v5l3 3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
    } else {
      return `<svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0;"><circle cx="12" cy="12" r="12" fill="${color}"/><path d="M9 9a3 3 0 115.2 2.2c-.8.9-1.2 2-1.2 3.2v.6m0 4v.01" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
    }
  }

  function getFilteredTasks() {
    return TASKS.filter(t => {
      if (!state.selectedScopes.includes(t.scope)) return false;
      const status = getTaskStatus(t);
      if (!state.selectedStatuses.includes(status)) return false;

      const todayObj = new Date(2026, 6, 13);
      let diffDays = Infinity;
      if (t.dueType === 'fixed') {
        const due = calculateTargetDate(state.currentYear, t.dueMonth, t.dueDay);
        diffDays = Math.ceil((due - todayObj) / (1000 * 60 * 60 * 24));
      }

      if (state.quickFilter === 'fed' && t.scope !== 'Federal') return false;
      if (state.quickFilter === 'ca' && t.scope !== 'California') return false;
      if (state.quickFilter === 'de' && t.scope !== 'Delaware') return false;
      if (state.quickFilter === 'intl' && t.scope !== 'Internal') return false;
      if (state.quickFilter === 'ins' && t.scope !== 'Insurance') return false;
      
      if (state.quickFilter === '1w' && !(status === 'overdue' || (t.dueType === 'fixed' && diffDays <= 7 && status !== 'filed'))) return false;
      if (state.quickFilter === '2w' && !(status === 'overdue' || (t.dueType === 'fixed' && diffDays <= 14 && status !== 'filed'))) return false;
      if (state.quickFilter === '1m' && !(status === 'overdue' || (t.dueType === 'fixed' && diffDays <= 30 && status !== 'filed'))) return false;
      
      if (state.quickFilter === 'overdue_q' && status !== 'overdue') return false;
      if (state.quickFilter === 'filed_q' && status !== 'filed') return false;

      if (state.searchQuery) {
        const statusLabel = getStatusLabel(status).toLowerCase();
        return t.title.toLowerCase().includes(state.searchQuery) ||
               t.info.toLowerCase().includes(state.searchQuery) ||
               t.scope.toLowerCase().includes(state.searchQuery) ||
               t.short.toLowerCase().includes(state.searchQuery) ||
               statusLabel.includes(state.searchQuery);
      }
      return true;
    });
  }

  function render() {
    renderSidebarFilters();
    const title = document.getElementById('monthTitle');
    const navControls = document.getElementById('calNavCluster');
    const workspace = document.getElementById('mainContent');
    
    document.getElementById('matrixYearLabel').textContent = `(FY ${state.currentYear})`;

    if (state.currentView === 'calendar') {
      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      title.textContent = `${monthNames[state.currentMonth]} ${state.currentYear} Pipeline`;
      navControls.style.display = 'flex';
      renderCalendarGrid(workspace);
    } else if (state.currentView === 'list') {
      title.textContent = `Master Corporate Ledger Workspace (${state.currentYear})`;
      navControls.style.display = 'flex';
      renderMasterLedgerView(workspace);
    } else if (state.currentView === 'archive') {
      title.textContent = `Global Corporate Audit Logs`;
      navControls.style.display = 'none';
      renderArchiveView(workspace);
    }
  }

  function renderSidebarFilters() {
    const statsContainer = document.getElementById('statsList');
    statsContainer.innerHTML = '';
    ['overdue', 'soon', 'month', 'filed', 'upcoming', 'needsdate'].forEach(st => {
      const count = TASKS.filter(t => getTaskStatus(t) === st).length;
      const active = state.selectedStatuses.includes(st);

      { id: 'Q3', label: 'Quarter 3 (Q3) Framework Objectives', filter: t => t.quarter === 'Q3' },
      { id: 'Q4', label: 'Quarter 4 (Q4) Framework Objectives', filter: t => t.quarter === 'Q4' },

  function renderCalendarGrid(container) {
    container.innerHTML = '';
    const weekdaysDiv = document.createElement('div');
    weekdaysDiv.className = 'weekdays';
    ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"].forEach(w => {
      const d = document.createElement('div'); d.textContent = w; weekdaysDiv.appendChild(d);
    });
    container.appendChild(weekdaysDiv);

    const gridDiv = document.createElement('div');
    gridDiv.className = 'cal-grid';

    const firstDayIndex = new Date(state.currentYear, state.currentMonth, 1).getDay();
    const totalDays = new Date(state.currentYear, state.currentMonth + 1, 0).getDate();
    const prevTotalDays = new Date(state.currentYear, state.currentMonth, 0).getDate();

    for (let i = firstDayIndex - 1; i >= 0; i--) {
      const cell = document.createElement('div');
      cell.className = 'day-cell outside';
      cell.innerHTML = `<div class="daynum">${prevTotalDays - i}</div>`;
      gridDiv.appendChild(cell);
    }

    const currentTasks = getFilteredTasks().filter(t => t.dueType === 'fixed' && t.dueMonth === (state.currentMonth + 1));
    const todayObj = new Date(2026, 6, 13);

    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (day === todayObj.getDate() && state.currentMonth === todayObj.getMonth() && state.currentYear === todayObj.getFullYear()) {
        cell.classList.add('today');
      }

      let inner = `<div class="daynum">${day}</div>`;
      
      currentTasks.forEach(t => {
        const calculatedDate = calculateTargetDate(state.currentYear, t.dueMonth, t.dueDay);
        if (calculatedDate.getDate() === day && calculatedDate.getMonth() === state.currentMonth) {
            inner += `<div class="chip ${getTaskStatus(t)}" data-task-id="${t.id}">${t.short}</div>`;
        }
      });

      cell.innerHTML = inner;
      cell.addEventListener('click', () => openDayModalView(day));
      gridDiv.appendChild(cell);
    }

    const remaining = (firstDayIndex + totalDays) % 7 === 0 ? 0 : 7 - ((firstDayIndex + totalDays) % 7);
    for (let nextDay = 1; nextDay <= remaining; nextDay++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell outside';
      cell.innerHTML = `<div class="daynum">${nextDay}</div>`;
      gridDiv.appendChild(cell);
    }
    container.appendChild(gridDiv);
  }

  function deleteTask(taskId) {
    if(confirm("Are you sure you want to permanently delete this task?")) {
      let customTasks = JSON.parse(localStorage.getItem('bookr_custom_tasks') || '[]');
      customTasks = customTasks.filter(t => t.id !== taskId);
      localStorage.setItem('bookr_custom_tasks', JSON.stringify(customTasks));

      let deletedCore = JSON.parse(localStorage.getItem('bookr_deleted_core') || '[]');
      if(!deletedCore.includes(taskId)) {
        deletedCore.push(taskId);
        localStorage.setItem('bookr_deleted_core', JSON.stringify(deletedCore));
      }
      
      STATE_LOGS = STATE_LOGS.filter(l => l.taskId !== taskId);
      localStorage.setItem('bookr_compliance_logs', JSON.stringify(STATE_LOGS));

      loadDatabase();
      render();
    }
  }

  function rebuildHistoryTableInline(id) {
    const tbody = document.getElementById(`hist-table-${id}`);
    tbody.innerHTML = '';
    const logs = STATE_LOGS.filter(l => l.taskId === id);
    if (logs.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="history-empty">No logged filing assets exist inside this form workspace layer.</td></tr>`;

    logs.forEach(l => {

  function submitExecutionFormInline(id) {
    const actionValue = document.getElementById(`act-${id}`).value;
    const fiscalYearVal = document.getElementById(`fyear-${id}`).value;
    const dateValue = document.getElementById(`date-${id}`).value;
    const cloudLinkValue = document.getElementById(`link-${id}`).value;
    const noteValue = document.getElementById(`note-${id}`).value;
    const fileInput = document.getElementById(`file-${id}`);

    if (actionValue === 'clear_all') {
      if (confirm("Are you sure you want to completely wipe all logged submission histories for this specific milestone?")) {
        STATE_LOGS = STATE_LOGS.filter(l => l.taskId !== id);
        localStorage.setItem('bookr_compliance_logs', JSON.stringify(STATE_LOGS));
        document.getElementById(`form-${id}`).classList.remove('open');
        render();
        return;
      } else { return; }
    } else if (actionValue === 'reset') {
      STATE_LOGS = STATE_LOGS.filter(l => !(l.taskId === id && parseInt(l.fiscalYear) === parseInt(fiscalYearVal)));
      localStorage.setItem('bookr_compliance_logs', JSON.stringify(STATE_LOGS));
      document.getElementById(`form-${id}`).classList.remove('open');
      render();
      return;
    }

    const saveLogData = (fileBase64 = null, fileName = null) => {
      STATE_LOGS.push({
        id: 'log_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        taskId: id,
        timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19),
        action: actionValue,
        fiscalYear: parseInt(fiscalYearVal),
        date: dateValue,
        cloudLink: cloudLinkValue,
        note: noteValue,
        fileData: fileBase64,
        fileName: fileName
      });
      localStorage.setItem('bookr_compliance_logs', JSON.stringify(STATE_LOGS));
      document.getElementById(`form-${id}`).classList.remove('open');
      render();
      const hist = document.getElementById(`hist-${id}`);
      if (hist && hist.classList.contains('open')) rebuildHistoryTableInline(id);
    };

    if (fileInput && fileInput.files && fileInput.files[0]) {
      const targetFile = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        saveLogData(e.target.result, targetFile.name);
      };
      reader.readAsDataURL(targetFile);
    } else {
      saveLogData();
    }
  }

  function deleteHistoryEntryGlobal(logId) {
    let taskId = null;
    const logItem = STATE_LOGS.find(l => l.id === logId);
    if (logItem) taskId = logItem.taskId;

    STATE_LOGS = STATE_LOGS.filter(l => l.id !== logId);
    localStorage.setItem('bookr_compliance_logs', JSON.stringify(STATE_LOGS));
    
    render();
    if (taskId) {
      const hist = document.getElementById(`hist-${taskId}`);
      if (hist && hist.classList.contains('open')) rebuildHistoryTableInline(taskId);
    }
    if (state.currentView === 'archive') renderArchiveView(document.getElementById('mainContent'));
    if (document.getElementById('modalOverlay').classList.contains('open') && activeModalDay !== null) rebuildModalActiveDayMarkup();
  }

          <div class="field"><label>Portal Identity Name</label><input type="text" id="newPortalName" placeholder="e.g. CA SoS bizfile"></div>
          <div class="field"><label>Portal Endpoint URL</label><input type="url" id="newPortalUrl" placeholder="https://..."></div>
          
          <div class="full-width field"><label>Scope Operational Instructions</label><textarea id="newInfo" rows="3" placeholder="Input legal data directives..."></textarea></div>
          
          <div class="full-width" style="display:flex; justify-content:flex-end; gap:12px; margin-top:12px; border-top: 1px solid var(--border); padding-top: 16px;">
            <button class="btn" type="button" onclick="closeModalWindow()">Cancel Process</button>
            <button class="btn primary" type="button" onclick="commitCustomMilestoneObject()">Save Framework Milestone</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function commitCustomMilestoneObject() {
    const sToken = document.getElementById('newShort').value.trim();
    const titleText = document.getElementById('newTitle').value.trim();
    if (!sToken || !titleText) { alert('Please compile required text parameters.'); return; }

    const type = document.getElementById('newDueType').value;
    const m = parseInt(document.getElementById('newDueMonth').value);
    const d = parseInt(document.getElementById('newDueDay').value);
    const targetYr = parseInt(document.getElementById('newTargetYear').value);
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    const customObj = {
      id: 'cust_' + Date.now(),
      num: TASKS.length + 1,
      quarter: document.getElementById('newQuarter').value,
      scope: document.getElementById('newScope').value,
      short: sToken,
      title: titleText,
      dueType: type,
      dueMonth: m,
      dueDay: d,
      dueText: type === 'fixed' ? `${monthNames[m-1]} ${d}` : 'Rolling Milestone',
      entity: document.getElementById('newEntity').value.trim() || 'Bookr, Inc.',
      portal: document.getElementById('newPortalName').value.trim() ? { name: document.getElementById('newPortalName').value.trim(), url: document.getElementById('newPortalUrl').value.trim() || '#' } : null,
      info: document.getElementById('newInfo').value.trim() || 'Custom parameters.'
    };

    let currentCustomList = JSON.parse(localStorage.getItem('bookr_custom_tasks') || '[]');
    currentCustomList.push(customObj);
    localStorage.setItem('bookr_custom_tasks', JSON.stringify(currentCustomList));

    loadDatabase();
    
    if (targetYr !== state.currentYear) {
      state.currentYear = targetYr;
      document.getElementById('yearSelect').value = targetYr;
    }
    
    closeModalWindow();
    render();
  }

  let activeModalDay = null;
  function openDayModalView(day) {
    activeModalDay = day;
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById('modalTitle').textContent = `Target Portfolio: ${monthNames[state.currentMonth]} ${day}, ${state.currentYear}`;
    rebuildModalActiveDayMarkup();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function openTaskModalInline(taskId) {
    activeModalDay = null;
    const task = TASKS.find(t => t.id === taskId);
    if (!task) return;
    document.getElementById('modalTitle').textContent = `Record: ${task.short}`;
    const body = document.getElementById('modalBody');
    body.innerHTML = '';
    body.appendChild(renderTaskCard(task));
    document.getElementById('modalOverlay').classList.add('open');
  }

  function rebuildModalActiveDayMarkup() {
    const matches = getFilteredTasks().filter(t => t.dueType === 'fixed' && t.dueMonth === (state.currentMonth + 1));
    const dayMatches = matches.filter(t => calculateTargetDate(state.currentYear, t.dueMonth, t.dueDay).getDate() === activeModalDay);
    
    const body = document.getElementById('modalBody');
    if (body) {
      body.innerHTML = dayMatches.length === 0 ? `<div class="modal-empty">No standard filing items registered on this calendar index block.</div>` : '';
      dayMatches.forEach(t => body.appendChild(renderTaskCard(t)));
    }
  }

  function closeModalWindow() { document.getElementById('modalOverlay').classList.remove('open'); activeModalDay = null; }

  function exportToCsvArchive() {
    let csvContent = "data:text/csv;charset=utf-8,ID,Number,Quarter,Scope,Title,Status,Target Deadline\n";
    TASKS.forEach(t => {
      csvContent += `${t.id},${t.num || '#'},${t.quarter},"${t.scope}","${t.title.replace(/"/g, '""')}",${getStatusLabel(getTaskStatus(t))},"${t.dueText}"\n`;
    });
    const dl = document.createElement("a");
    dl.setAttribute("href", encodeURI(csvContent));
    dl.setAttribute("download", "bookr_compliance_master_ledger.csv");
    document.body.appendChild(dl); dl.click(); document.body.removeChild(dl);
  }

  window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
